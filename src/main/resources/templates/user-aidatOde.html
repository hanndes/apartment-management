<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Aidat Öde</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">

<div class="admin-layout">

    <aside class="admin-sidebar">
        <div class="brand">
            <div class="brand-icon">🏢</div>
            <div>
                <div class="brand-title">Apartment</div>
                <div class="brand-sub">Management</div>
            </div>
        </div>

        <nav class="nav-links">
            <a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/user/aidat-ode}">Aidat Öde</a>
            <a class="nav-link" th:href="@{/user/payments}">Ödemelerim</a>
        </nav>

        <a th:href="@{/logout}" class="sidebar-logout">Çıkış Yap</a>
    </aside>

   
    <main class="admin-main">

        <header class="topbar">
            <div>
                <h1>Aidat Ödeme</h1>
                <p>Ödenmemiş aidat bilgileriniz</p>
            </div>
        </header>

        <section class="panel-grid">

            <article class="panel" style="grid-column: 1 / -1;">
                <div class="panel-head">
                    <h3>💳 Aidatlar</h3>
                </div>

                
                <div th:if="${not #lists.isEmpty(debts)}" class="table-wrapper">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Dönem</th>
                            <th>Tutar</th>
                            <th>Kalan</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="debt : ${debts}">
                            <td th:text="${debt.periodId}">2025-01</td>
                            <td th:text="${debt.amount}">₺1250</td>
                            <td th:text="${debt.remainingAmount}">₺1250</td>
                            <td>
                                <form method="post" th:action="@{/user/pay}">
                                    <input type="hidden" name="debtId" th:value="${debt.id}">
                                    <button class="btn primary">Öde</button>
                                </form>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                
                <div th:if="${#lists.isEmpty(debts)}"
                     style="text-align:center; padding:30px; color:#999;">
                    🎉 Şu an ödenecek aidatınız bulunmamaktadır.
                </div>

            </article>

        </section>

    </main>
</div>

</body>
</html>
