<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ödemelerim & Borçlar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .split-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start; }
        @media (max-width: 992px) { .split-layout { grid-template-columns: 1fr; } }

        .debt-card {
            background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px;
            border-left: 5px solid #eee; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .debt-card.unpaid { border-left-color: #e63946; } /* Ödenmemiş - Kırmızı */
        .debt-card.paid { border-left-color: #2a9d8f; opacity: 0.8; } /* Ödenmiş - Yeşil */
    </style>
</head>
<body class="user-body" style="background-color: #f4f7f6;">
<div class="admin-layout">

    <aside class="admin-sidebar" style="background: #2c3e50;">
        <div class="brand"><div class="brand-icon">🏠</div><div><div class="brand-title">Sakin</div><div class="brand-sub">Paneli</div></div></div>
        <nav class="nav-links">
            <a class="nav-link" th:href="@{/user/dashboard}">Ana Sayfa</a>
            <a class="nav-link active" th:href="@{/user/payments}">Ödemelerim</a>
            <a class="nav-link" th:href="@{/user/complaints}">Taleplerim</a>
            <a class="nav-link" th:href="@{/user/announcements}">Duyurular</a>
        </nav>
        <a th:href="@{/logout}" class="sidebar-logout">Çıkış Yap</a>
    </aside>

    <main class="admin-main">
        <header class="topbar">
            <div><h1>Ödemelerim</h1><p>Aidat ve gider borçlarınızın durumu</p></div>
            <div class="user-chip" th:text="${#strings.substring(user.username, 0, 1)}">U</div>
        </header>

        <section class="panel">
            <div class="panel-head"><h3>Borç Dökümü</h3></div>

            <div style="margin-top: 20px;">
                <div th:each="debt : ${debts}"
                     class="debt-card"
                     th:classappend="${debt.paid ? 'paid' : 'unpaid'}">

                    <div>
                        <div style="font-weight: bold; font-size: 1.1em;" th:text="${debt.typeName}">Aidat</div>
                        <div style="color: #666; font-size: 0.9em;" th:text="${debt.periodName}">Ocak 2025</div>
                        <small style="color: #999;" th:text="${#dates.format(debt.createdAt, 'dd MMM yyyy')}">Tarih</small>
                    </div>

                    <div style="text-align: right;">
                        <div style="font-size: 1.2em; font-weight: bold;"
                             th:text="'₺' + ${debt.amount}">₺1250.00</div>

                        <div th:if="${!debt.paid}" style="color: #e63946; font-weight: 600;">
                            Ödenmedi <span th:if="${debt.remainingAmount < debt.amount}">(Kısmi)</span>
                        </div>
                        <div th:if="${debt.paid}" style="color: #2a9d8f; font-weight: 600;">
                            ✅ Ödendi
                        </div>
                    </div>
                </div>

                <div th:if="${#lists.isEmpty(debts)}" style="text-align: center; padding: 40px; color: #999;">
                    Kayıtlı borç veya ödeme bilgisi bulunamadı.
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
